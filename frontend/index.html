<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/logonouveau.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-GARAGE</title>
    <script>
      // SCRIPT DE NETTOYAGE D'URGENCE (TEMPORAIRE)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for(let reg of regs) reg.unregister();
          if(regs.length > 0) console.log("Ancien Service Worker nettoyé !");
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
